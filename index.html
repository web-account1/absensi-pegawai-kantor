<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital - Kantor Camat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="background-overlay"></div>

    <div id="login-screen" class="login-container">
        <div class="card active login-box">
            <img src="https://cdn-icons-png.flaticon.com/512/295/295128.png" width="70">
            <h2>Sistem Absensi Digital</h2>
            <p>Kantor Camat Sikur</p>
            <div id="role-selection">
                <button class="btn" onclick="showLoginForm('admin')">Login Admin</button>
                <button class="btn" onclick="showLoginForm('pegawai')">Login Pegawai</button>
            </div>
            <div id="form-input" style="display:none; margin-top: 20px;">
                <input type="password" id="pass-input" placeholder="Masukkan Password">
                <button class="btn green" onclick="verifyLogin()">Masuk</button>
                <button class="btn-link" onclick="location.reload()">Kembali</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="wrapper" style="display: none;">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3>MENU</h3>
            </div>
            <ul>
                <li id="menu-home" onclick="showSection('home')">🏠 Dashboard</li>
                <li id="menu-absensi" onclick="showSection('absensi')">📸 Scan Absen</li>
                <li id="menu-rekap" onclick="showSection('rekap-admin')" style="display:none;">📊 Rekap Kehadiran</li>
                <li onclick="location.reload()">🚪 Logout</li>
            </ul>
        </nav>

        <main class="content">
            <section id="home" class="card active">
                <h1>Selamat Datang</h1>
                <p id="welcome-msg">Silakan gunakan menu di samping untuk memulai aktivitas</p>
            </section>

            <section id="absensi" class="card">
                <h1>Scan QR Code</h1>
                <div id="status-hari">Memeriksa hari...</div>
                <div id="reader"></div>
                <p id="result"></p>
            </section>

            <section id="rekap-admin" class="card">
                <h1>Rekap Kehadiran Hari Ini</h1>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Waktu</th>
                                <th>ID Pegawai</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="data-body"></tbody>
                    </table>
                </div>
                <button class="btn" onclick="muatData()">Refresh Data</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
